# STANDALONE DEV COMPOSE — for running the RAGUI client in isolation.
# For the full integrated stack (RAG + RAGUI + nginx), use the root docker-compose.yml.

services:
  ui:
    build:
      context: ./
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm start